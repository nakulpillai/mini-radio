<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini Radio">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Mini Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .settings-btn {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      right: calc(16px + env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-btn:hover { background: #1a1a1a; }
    .settings-btn:active { background: #1a1a1a; }
    .settings-btn svg { width: 22px; height: 22px; fill: #555; transition: fill 0.2s; }
    .settings-btn:hover svg { fill: #aaa; }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .station-name {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      text-align: center;
      padding: 0 24px;
    }

    .play-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #333;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:hover {
      border-color: #fff;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
    }

    .play-btn:active { transform: scale(0.96); }
    .play-btn svg { width: 40px; height: 40px; fill: #fff; }

    .play-btn.playing {
      border-color: #4caf50;
      box-shadow: 0 0 40px rgba(76, 175, 80, 0.15);
    }

    .status {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      height: 16px;
    }

    .status.live { color: #4caf50; }

    /* Settings Panel */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 10;
    }

    .overlay.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      max-width: 100vw;
      height: 100%;
      background: #161616;
      border-left: 1px solid #222;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-right: env(safe-area-inset-right);
    }

    .panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    .panel-header h2 {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
      color: #888;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .close-btn:hover { background: #222; }
    .close-btn:active { background: #222; }
    .close-btn svg { width: 18px; height: 18px; fill: #555; }

    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus { border-color: #444; }
    .field input::placeholder { color: #333; }

    .save-btn {
      margin-top: 8px;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .save-btn:hover { opacity: 0.85; }
    .save-btn:active { opacity: 0.7; }

    .saved-msg {
      text-align: center;
      font-size: 12px;
      color: #4caf50;
      letter-spacing: 1px;
      height: 16px;
    }
  </style>
</head>
<body>

  <!-- Settings gear icon -->
  <button class="settings-btn" id="settingsBtn" aria-label="Settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94 7.07 7.07 0 0 0-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.04 7.04 0 0 0-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0-.06.94c0 .32.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54a7.04 7.04 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
  </button>

  <!-- Player -->
  <div class="player">
    <div class="station-name" id="stationName">Mini Radio</div>

    <button class="play-btn" id="playBtn" aria-label="Play">
      <svg id="playIcon" viewBox="0 0 24 24">
        <polygon points="6,3 20,12 6,21" />
      </svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
        <rect x="5" y="3" width="4" height="18" />
        <rect x="15" y="3" width="4" height="18" />
      </svg>
    </button>

    <div class="status" id="status">Tap to play</div>
  </div>

  <!-- Settings Panel -->
  <div class="overlay" id="overlay"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <h2>Settings</h2>
      <button class="close-btn" id="closeBtn" aria-label="Close settings">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 1 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="field">
        <label>Station Name</label>
        <input type="text" id="inputName" placeholder="e.g. Red FM 93.5" />
      </div>
      <div class="field">
        <label>Stream URL</label>
        <input type="url" id="inputUrl" placeholder="https://stream.example.com/radio" />
      </div>
      <button class="save-btn" id="saveBtn">Save</button>
      <div class="saved-msg" id="savedMsg"></div>
    </div>
  </div>

  <audio id="radio" preload="none"></audio>

  <script>
    const radio = document.getElementById('radio');
    const btn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const statusEl = document.getElementById('status');
    const stationNameEl = document.getElementById('stationName');

    const settingsBtn = document.getElementById('settingsBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('panel');
    const inputName = document.getElementById('inputName');
    const inputUrl = document.getElementById('inputUrl');
    const saveBtn = document.getElementById('saveBtn');
    const savedMsg = document.getElementById('savedMsg');

    let channel = loadChannel();
    let playing = false;

    applyChannel();

    // --- Settings panel ---
    function openPanel() {
      inputName.value = channel.name;
      inputUrl.value = channel.url;
      savedMsg.textContent = '';
      panel.classList.add('open');
      overlay.classList.add('open');
    }

    function closePanel() {
      panel.classList.remove('open');
      overlay.classList.remove('open');
    }

    settingsBtn.addEventListener('click', openPanel);
    closeBtn.addEventListener('click', closePanel);
    overlay.addEventListener('click', closePanel);

    saveBtn.addEventListener('click', () => {
      const name = inputName.value.trim();
      const url = inputUrl.value.trim();

      if (!name || !url) {
        savedMsg.textContent = 'Both fields are required';
        savedMsg.style.color = '#f44336';
        setTimeout(() => { savedMsg.textContent = ''; savedMsg.style.color = ''; }, 2000);
        return;
      }

      channel = { name, url };
      localStorage.setItem('miniradio_channel', JSON.stringify(channel));
      applyChannel();

      savedMsg.textContent = 'Saved';
      savedMsg.style.color = '';
      setTimeout(() => { savedMsg.textContent = ''; }, 2000);

      if (playing) {
        radio.pause();
        radio.src = '';
        setUI(false);
      }

      closePanel();
    });

    function loadChannel() {
      try {
        const stored = JSON.parse(localStorage.getItem('miniradio_channel'));
        if (stored && stored.name && stored.url) return stored;
      } catch {}
      return null;
    }

    function applyChannel() {
      if (channel) {
        stationNameEl.textContent = channel.name;
        statusEl.textContent = 'Tap to play';
      } else {
        stationNameEl.textContent = 'Mini Radio';
        statusEl.textContent = 'Set up a station';
      }
    }

    // --- Player ---
    btn.addEventListener('click', () => {
      if (!channel) {
        openPanel();
        return;
      }

      if (playing) {
        radio.pause();
        radio.src = '';
        setUI(false);
      } else {
        statusEl.textContent = 'Connecting...';
        statusEl.className = 'status';
        radio.src = channel.url;
        radio.play().catch(() => {
          statusEl.textContent = 'Stream unavailable';
        });
      }
    });

    radio.addEventListener('playing', () => setUI(true));

    radio.addEventListener('error', () => {
      setUI(false);
      statusEl.textContent = 'Stream unavailable';
    });

    function setUI(isPlaying) {
      playing = isPlaying;
      playIcon.style.display = isPlaying ? 'none' : 'block';
      pauseIcon.style.display = isPlaying ? 'block' : 'none';
      btn.classList.toggle('playing', isPlaying);
      btn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
      statusEl.textContent = isPlaying ? 'Live' : 'Tap to play';
      statusEl.className = isPlaying ? 'status live' : 'status';
    }

    // --- PWA Service Worker ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
